<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Riya AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

.chat-bubble{
max-width:80%;
padding:14px;
border-radius:16px;
white-space:pre-wrap;
}

@media (max-width:768px){
.chat-bubble{
max-width:90%;
}
}

.user{
background:#7c3aed;
color:white;
margin-left:auto;
}

.assistant{
background:#f3f4f6;
}

.typing{
opacity:.6;
font-style:italic;
}

.sidebar-mobile{
position:fixed;
left:-100%;
top:0;
height:100%;
width:260px;
z-index:50;
transition:0.3s;
}

.sidebar-mobile.open{
left:0;
}

.overlay{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
z-index:40;
display:none;
}

.overlay.show{
display:block;
}

</style>

</head>

<body class="bg-gray-100">

<div class="overlay" id="overlay"></div>

<div class="flex h-screen overflow-hidden">

<!-- SIDEBAR -->

<div id="sidebar"
class="sidebar-mobile md:relative md:left-0 md:w-72 bg-white border-r flex flex-col">

<div class="p-4 border-b flex justify-between items-center">

<div class="font-bold text-purple-700">Riya AI</div>

<button id="toggleSidebar" class="md:hidden">
<i class="fa fa-times"></i>
</button>

</div>

<div class="p-2">
<input id="searchChat"
placeholder="Search..."
class="w-full border rounded p-2 text-sm">
</div>

<div id="conversationList"
class="flex-1 overflow-y-auto p-2 space-y-2">
</div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<!-- HEADER -->

<div class="p-4 bg-white border-b flex items-center gap-3">

<button id="openSidebar" class="md:hidden">
<i class="fa fa-bars"></i>
</button>

<div class="font-bold text-purple-700 text-lg">
Riya's AI Assistant
</div>

<button id="newChatBtn"
class="ml-auto bg-purple-600 text-white px-3 py-1 rounded">
+ New
</button>

</div>

<!-- CHAT -->

<div id="chat"
class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
</div>

<div id="typing"
class="px-4 pb-2 text-sm text-gray-500 hidden">
AI is typing...
</div>

<!-- INPUT -->

<form id="chatForm"
class="bg-white border-t p-3 flex gap-2">

<input id="input"
class="flex-1 border rounded-xl p-3 text-sm"
placeholder="Message Riya...">

<button class="bg-purple-600 text-white px-4 rounded-xl">
Send
</button>

</form>

</div>

</div>

<script>

let messages=[]
let conversationId=null

const chat=document.getElementById("chat")
const typing=document.getElementById("typing")

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")

/* -----------------------
SIDEBAR MOBILE
------------------------*/

function openSidebar(){
sidebar.classList.add("open")
overlay.classList.add("show")
}

function closeSidebar(){
sidebar.classList.remove("open")
overlay.classList.remove("show")
}

document.getElementById("openSidebar").onclick=openSidebar
document.getElementById("toggleSidebar").onclick=closeSidebar
overlay.onclick=closeSidebar

/* -----------------------
CONVERSATIONS
------------------------*/

async function newChat(){

const res=await fetch("/conversation/new",{method:"POST"})
const data=await res.json()

conversationId=data.id

messages=[]

chat.innerHTML=""

refreshConversations()

closeSidebar()

}

async function refreshConversations(){

const res=await fetch("/conversations")
const list=await res.json()

const container=document.getElementById("conversationList")

container.innerHTML=""

list.forEach(c=>{

const div=document.createElement("div")

div.className="flex justify-between items-center p-2 border rounded hover:bg-gray-100 text-sm"

div.innerHTML=`
<span class="truncate cursor-pointer"
onclick="loadConversation('${c.id}')">
${c.title}
</span>

<button onclick="deleteConversation('${c.id}')">
<i class="fa fa-trash text-red-500"></i>
</button>
`

container.appendChild(div)

})

}

async function deleteConversation(id){

await fetch("/conversation/"+id,{method:"DELETE"})
refreshConversations()

}

async function loadConversation(id){

conversationId=id

const res=await fetch("/conversation/"+id)
const data=await res.json()

messages=data.messages

chat.innerHTML=""

messages.forEach(m=>{
addBubble(m.role,m.content)
})

closeSidebar()

}

/* -----------------------
CHAT UI
------------------------*/

function addBubble(role,text){

const div=document.createElement("div")

div.className="chat-bubble "+(role==="user"?"user":"assistant")

div.innerHTML=marked.parse(text)

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

return div

}

function typingOn(){
typing.classList.remove("hidden")
}

function typingOff(){
typing.classList.add("hidden")
}

/* -----------------------
SEND MESSAGE
------------------------*/

async function sendMessage(e){

e.preventDefault()

const input=document.getElementById("input")
const text=input.value.trim()

if(!text)return

addBubble("user",text)

messages.push({role:"user",content:text})

input.value=""

typingOn()

const assistantBubble=addBubble("assistant","")

const res=await fetch("/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
conversation_id:conversationId,
messages:messages
})

})

const reader=res.body.getReader()
const decoder=new TextDecoder()

let buffer=""
let fullMessage=""

while(true){

const {done,value}=await reader.read()

if(done)break

buffer+=decoder.decode(value,{stream:true})

const parts=buffer.split("\n\n")
buffer=parts.pop()

for(const p of parts){

if(p.startsWith("data: ")){

const payload=p.slice(6)

if(payload==="[DONE]")continue

const parsed=JSON.parse(payload)

fullMessage+=parsed.content

assistantBubble.innerHTML=marked.parse(fullMessage)

chat.scrollTop=chat.scrollHeight

}

}

}

typingOff()

messages.push({
role:"assistant",
content:assistantBubble.innerText
})

refreshConversations()

}

/* -----------------------
SEARCH
------------------------*/

document.getElementById("searchChat")
.addEventListener("input",e=>{

const query=e.target.value.toLowerCase()

const items=[...document.querySelectorAll("#conversationList div")]

items.forEach(i=>{
const text=i.innerText.toLowerCase()
i.style.display=text.includes(query)?"flex":"none"
})

})

document.getElementById("chatForm")
.addEventListener("submit",sendMessage)

document.getElementById("newChatBtn")
.addEventListener("click",newChat)

window.onload=()=>{
newChat()
refreshConversations()
}

</script>

</body>
</html>
